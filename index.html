<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食玩・ガチャ 発売カレンダー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f5f0;
  --bg2: #eeeae2;
  --bg3: #e4dfd5;
  --surface: #fffefb;
  --text: #1c1a16;
  --text2: #6b6558;
  --text3: #a09890;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --accent: #e8622a;
  --accent2: #f5a623;
  --radius: 10px;
  --radius-lg: 16px;
  --radius-xl: 22px;
  --shadow: 0 2px 8px rgba(0,0,0,0.07);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --shokugan: #FAC775;
  --shokugan-dark: #7a4800;
  --gacha: #7ed9b8;
  --gacha-dark: #0a4a33;
  --figure: #93c4f0;
  --figure-dark: #0a3560;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #16140f;
    --bg2: #1e1c16;
    --bg3: #26231b;
    --surface: #1e1c16;
    --text: #f0ece3;
    --text2: #9a9080;
    --text3: #5c5548;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
  }
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  position: sticky; top: 0; z-index: 50;
}
.header-inner {
  max-width: 960px; margin: 0 auto;
  display: flex; align-items: center; gap: 12px;
  height: 58px;
}
.logo {
  font-family: 'Poppins', sans-serif;
  font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}
.logo span { font-size: 20px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

/* Admin badge */
.admin-badge {
  font-size: 11px; font-weight: 700; padding: 3px 10px;
  border-radius: 99px; background: var(--accent); color: white;
  display: none;
}
.admin-badge.show { display: inline-block; }

/* Buttons */
.btn {
  padding: 7px 15px; border-radius: var(--radius); font-size: 13px;
  font-weight: 500; cursor: pointer; border: 1px solid var(--border2);
  background: var(--surface); color: var(--text);
  transition: all 0.15s; font-family: inherit;
}
.btn:hover { background: var(--bg2); }
.btn:active { transform: scale(0.97); }
.btn-accent {
  background: var(--accent); color: white; border-color: transparent;
}
.btn-accent:hover { background: #d0511e; }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { background: var(--bg2); }

/* ── App body ── */
.app { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

/* Genre filters */
.filters-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.2rem; }
.pill {
  padding: 5px 14px; border-radius: 99px; font-size: 12px; font-weight: 700;
  cursor: pointer; border: 2px solid transparent; transition: opacity 0.15s, transform 0.1s;
  user-select: none; letter-spacing: 0.3px;
}
.pill:active { transform: scale(0.95); }
.pill.off { opacity: 0.3; }
.pill-all { background: var(--bg3); color: var(--text2); border-color: var(--border2); }
.pill-shokugan { background: var(--shokugan); color: var(--shokugan-dark); }
.pill-gacha    { background: var(--gacha);    color: var(--gacha-dark); }
.pill-figure   { background: var(--figure);   color: var(--figure-dark); }

/* Nav */
.nav-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;
}
.nav-arrow {
  width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; cursor: pointer; border: 1px solid var(--border2);
  background: var(--surface); font-size: 16px; transition: background 0.12s;
  color: var(--text);
}
.nav-arrow:hover { background: var(--bg2); }
.month-title {
  flex: 1; text-align: center;
  font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 700;
  letter-spacing: -0.5px;
}
.view-toggle {
  display: flex; border: 1px solid var(--border2); border-radius: var(--radius);
  overflow: hidden; background: var(--surface);
}
.vbtn {
  background: none; border: none; padding: 6px 12px; cursor: pointer;
  font-size: 12px; color: var(--text2); font-family: inherit; font-weight: 500;
  transition: background 0.12s;
}
.vbtn.on { background: var(--bg2); color: var(--text); }

/* Stats chips */
.stats-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
.stat-chip {
  font-size: 12px; padding: 4px 11px; border-radius: 99px;
  background: var(--surface); color: var(--text2);
  border: 1px solid var(--border); font-weight: 500;
}

/* ── Calendar ── */
.cal-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow);
}
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; background: var(--border); }
.cal-head { background: var(--bg2); padding: 8px 0; text-align: center; font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 1px; }
.cal-head:first-child { color: #e05050; }
.cal-head:last-child  { color: #5080e0; }
.cal-day {
  background: var(--surface); min-height: 88px; padding: 5px;
  cursor: default; transition: background 0.1s;
}
.cal-day.other { background: var(--bg); }
.cal-day.clickable { cursor: pointer; }
.cal-day.clickable:hover { background: var(--bg2); }
.cal-day.today .dnum { background: var(--accent); color: white; border-radius: 50%; }
.cal-day:first-child .dnum, .cal-day.sun .dnum { color: #e05050; }
.cal-day.sat .dnum { color: #5080e0; }
.dnum-wrap { display: flex; justify-content: flex-end; margin-bottom: 3px; }
.dnum { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text3); }
.cal-day.other .dnum { opacity: 0.35; }
.chip {
  font-size: 10px; padding: 2px 6px; border-radius: 5px; margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700;
  line-height: 1.5; display: block;
}
.chip-shokugan { background: var(--shokugan); color: var(--shokugan-dark); }
.chip-gacha    { background: var(--gacha);    color: var(--gacha-dark); }
.chip-figure   { background: var(--figure);   color: var(--figure-dark); }
.chip-more { font-size: 10px; color: var(--text3); padding-left: 3px; font-weight: 500; }

/* ── Card Grid (image view) ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}
.item-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
}
.item-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.card-img {
  width: 100%; aspect-ratio: 1; object-fit: cover;
  background: var(--bg2); display: block;
}
.card-img-placeholder {
  width: 100%; aspect-ratio: 1; background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
}
.card-body { padding: 10px; }
.card-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; line-height: 1.4; }
.card-date { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.card-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 99px;
  font-weight: 700; display: inline-block;
}
.card-actions { display: flex; gap: 4px; margin-top: 8px; }

/* ── List View ── */
.list-view { display: flex; flex-direction: column; gap: 6px; }
.list-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 10px 14px; box-shadow: var(--shadow);
}
.list-thumb {
  width: 44px; height: 44px; border-radius: 8px; object-fit: cover;
  background: var(--bg2); flex-shrink: 0;
}
.list-thumb-ph {
  width: 44px; height: 44px; border-radius: 8px; background: var(--bg2);
  display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
}
.list-info { flex: 1; min-width: 0; }
.list-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.list-badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 700; white-space: nowrap; }
.list-acts { display: flex; gap: 4px; }
.icon-btn {
  background: none; border: none; cursor: pointer; color: var(--text3);
  padding: 4px 7px; border-radius: 6px; font-size: 14px; transition: background 0.12s;
}
.icon-btn:hover { background: var(--bg2); color: var(--text); }
.icon-btn.danger:hover { background: #fcebeb; color: #a32d2d; }

.empty { text-align: center; padding: 3rem; color: var(--text3); font-size: 14px; }

/* ── AI Section ── */
.ai-section {
  margin-top: 1.5rem; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 1.25rem;
  box-shadow: var(--shadow);
}
.ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.ai-label {
  font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 99px;
  background: var(--accent); color: white; letter-spacing: 1px;
}
.ai-title { font-size: 14px; font-weight: 700; }
.ai-row { display: flex; gap: 7px; }
.ai-input {
  flex: 1; padding: 8px 12px; border: 1px solid var(--border2); border-radius: var(--radius);
  font-size: 13px; background: var(--bg); color: var(--text); font-family: inherit;
}
.ai-input:focus { outline: none; border-color: var(--accent); }
.ai-results { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
.ai-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
}
.ai-item-img {
  width: 40px; height: 40px; border-radius: 6px; object-fit: cover;
  background: var(--bg2); flex-shrink: 0;
}
.ai-item-img-ph {
  width: 40px; height: 40px; border-radius: 6px; background: var(--bg2);
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.ai-item-info { flex: 1; min-width: 0; }
.ai-item-name { font-size: 13px; font-weight: 700; }
.ai-item-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.ai-add-btn {
  padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border2);
  background: none; cursor: pointer; font-size: 12px; font-weight: 700;
  color: var(--text); white-space: nowrap; font-family: inherit; transition: all 0.12s;
}
.ai-add-btn:hover { background: var(--bg2); }
.ai-add-btn.added { background: #eaf3de; color: #3b6d11; border-color: #97c459; }
.ai-status { font-size: 13px; color: var(--text2); padding: 4px 0; }
.spinner {
  display: inline-block; width: 13px; height: 13px;
  border: 2px solid var(--border2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Modal ── */
.modal-bg {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  z-index: 200; align-items: center; justify-content: center; padding: 1rem;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius-xl);
  border: 1px solid var(--border2); padding: 1.75rem;
  width: min(480px, 100%); box-shadow: var(--shadow-lg);
  animation: slideUp 0.2s ease;
  max-height: 90vh; overflow-y: auto;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 1.25rem; }
.fg { margin-bottom: 14px; }
.fg label { font-size: 12px; color: var(--text2); font-weight: 700; display: block; margin-bottom: 5px; letter-spacing: 0.5px; }
.fg input, .fg select, .fg textarea {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border2);
  border-radius: var(--radius); font-size: 14px;
  background: var(--bg); color: var(--text); font-family: inherit;
  transition: border-color 0.12s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: var(--accent); }
.genre-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.go {
  padding: 8px; border-radius: var(--radius); border: 2px solid var(--border2);
  cursor: pointer; text-align: center; font-size: 12px; font-weight: 700;
  transition: all 0.12s; opacity: 0.45; font-family: inherit;
}
.go.on { opacity: 1; }
.go-shokugan { background: var(--shokugan); color: var(--shokugan-dark); border-color: #d4933a; }
.go-gacha    { background: var(--gacha);    color: var(--gacha-dark);    border-color: #2aaa7a; }
.go-figure   { background: var(--figure);   color: var(--figure-dark);   border-color: #4a9ae0; }
.img-preview {
  width: 100%; max-height: 120px; object-fit: cover; border-radius: var(--radius);
  margin-top: 6px; display: none; border: 1px solid var(--border);
}
.img-preview.show { display: block; }
.modal-acts { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }

/* Login modal */
.login-modal {
  background: var(--surface); border-radius: var(--radius-xl);
  border: 1px solid var(--border2); padding: 2rem;
  width: min(360px, 100%); box-shadow: var(--shadow-lg);
  animation: slideUp 0.2s ease; text-align: center;
}
.login-modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.login-modal p { font-size: 13px; color: var(--text2); margin-bottom: 1.25rem; }
.login-modal input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border2);
  border-radius: var(--radius); font-size: 15px; background: var(--bg);
  color: var(--text); font-family: inherit; text-align: center; letter-spacing: 2px;
  margin-bottom: 12px;
}
.login-modal input:focus { outline: none; border-color: var(--accent); }
.login-err { font-size: 12px; color: #a32d2d; margin-top: -6px; margin-bottom: 10px; display: none; }
.login-err.show { display: block; }

/* Loading overlay */
.loading-overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; flex-direction: column; gap: 12px;
}
.loading-overlay .spinner { width: 28px; height: 28px; border-width: 3px; }
.loading-overlay p { font-size: 14px; color: var(--text2); }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <span class="spinner"></span>
  <p>読み込み中...</p>
</div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo"><span>🎲</span> CandyToys</div>
    <div class="header-right">
      <span class="admin-badge" id="adminBadge">管理者モード</span>
      <button class="btn btn-sm" id="adminBtn" onclick="toggleAdmin()">管理者</button>
      <button class="btn btn-sm btn-accent" id="addBtn" onclick="openAdd()" style="display:none">＋ 追加</button>
    </div>
  </div>
</header>

<!-- App -->
<div class="app">
  <!-- Filters -->
  <div class="filters-row">
    <span class="pill pill-all" data-g="all" onclick="toggleGenre('all')">すべて</span>
    <span class="pill pill-shokugan" data-g="shokugan" onclick="toggleGenre('shokugan')">🍬 食玩</span>
    <span class="pill pill-gacha" data-g="gacha" onclick="toggleGenre('gacha')">🎰 ガチャガチャ</span>
    <span class="pill pill-figure" data-g="figure" onclick="toggleGenre('figure')">🗿 フィギュア</span>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow"></div>

  <!-- Nav -->
  <div class="nav-row">
    <div class="nav-arrow" onclick="prevMonth()">‹</div>
    <div class="month-title" id="monthTitle"></div>
    <div class="nav-arrow" onclick="nextMonth()">›</div>
    <div class="view-toggle">
      <button class="vbtn on" id="vCal" onclick="setView('cal')">📅</button>
      <button class="vbtn" id="vCard" onclick="setView('card')">🖼</button>
      <button class="vbtn" id="vList" onclick="setView('list')">📋</button>
    </div>
  </div>

  <!-- Calendar view -->
  <div id="viewCal">
    <div class="cal-wrap">
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <!-- Card view -->
  <div id="viewCard" style="display:none">
    <div class="card-grid" id="cardGrid"></div>
  </div>

  <!-- List view -->
  <div id="viewList" style="display:none">
    <div class="list-view" id="listView"></div>
  </div>

  <!-- AI search (admin only) -->
  <div class="ai-section" id="aiSection" style="display:none">
    <div class="ai-header">
      <span class="ai-label">AI</span>
      <span class="ai-title">発売情報を検索して追加</span>
    </div>
    <div class="ai-row">
      <input class="ai-input" id="aiInput" placeholder="例：バンダイ 食玩 2025夏、ポケモン ガチャ" onkeydown="if(event.key==='Enter')aiSearch()" />
      <button class="btn btn-accent" onclick="aiSearch()">検索</button>
    </div>
    <div class="ai-results" id="aiResults"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="itemModal" onclick="bgClick(event,'itemModal')">
  <div class="modal">
    <h2 id="modalTitle">アイテムを追加</h2>
    <div class="fg">
      <label>商品名 *</label>
      <input type="text" id="fName" placeholder="例：ワンピース DXF Vol.5" />
    </div>
    <div class="fg">
      <label>発売日 *</label>
      <input type="date" id="fDate" />
    </div>
    <div class="fg">
      <label>ジャンル *</label>
      <div class="genre-grid">
        <button class="go go-shokugan on" data-g="shokugan" onclick="selGenre('shokugan')">🍬 食玩</button>
        <button class="go go-gacha" data-g="gacha" onclick="selGenre('gacha')">🎰 ガチャ</button>
        <button class="go go-figure" data-g="figure" onclick="selGenre('figure')">🗿 フィギュア</button>
      </div>
    </div>
    <div class="fg">
      <label>画像URL（任意）</label>
      <input type="text" id="fImg" placeholder="https://..." oninput="previewImg()" />
      <img id="imgPreview" class="img-preview" />
    </div>
    <div class="fg">
      <label>メモ（任意）</label>
      <input type="text" id="fNote" placeholder="例：全6種、バンダイ、600円" />
    </div>
    <div class="fg">
      <label>商品URL（任意）</label>
      <input type="text" id="fUrl" placeholder="https://..." />
    </div>
    <div class="modal-acts">
      <button class="btn" onclick="closeModal('itemModal')">キャンセル</button>
      <button class="btn btn-accent" onclick="saveItem()">保存</button>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div class="modal-bg" id="loginModal" onclick="bgClick(event,'loginModal')">
  <div class="login-modal">
    <h2>🔐 管理者ログイン</h2>
    <p>パスワードを入力してください</p>
    <input type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
    <div class="login-err" id="loginErr">パスワードが違います</div>
    <button class="btn btn-accent" style="width:100%" onclick="doLogin()">ログイン</button>
  </div>
</div>

  measurementId: "G-6LM18K2L24"
};
// ============================================================

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const itemsRef = ref(db, 'items');

// ── State ──
let items = {};
let year  = new Date().getFullYear();
let month = new Date().getMonth();
let activeGenres = new Set(['shokugan','gacha','figure']);
let currentView  = 'cal';
let isAdmin      = false;
let editKey      = null;
let selGenreVal  = 'shokugan';

// ── Helpers ──
const GL = { shokugan:'食玩', gacha:'ガチャ', figure:'フィギュア' };
const GE = { shokugan:'🍬', gacha:'🎰', figure:'🗿' };
const GC = { shokugan:'chip-shokugan', gacha:'chip-gacha', figure:'chip-figure' };
const GB = { shokugan:`background:var(--shokugan);color:var(--shokugan-dark)`,
             gacha:   `background:var(--gacha);color:var(--gacha-dark)`,
             figure:  `background:var(--figure);color:var(--figure-dark)` };

// ── Firebase realtime listener ──
onValue(itemsRef, snap => {
  items = snap.val() || {};
  document.getElementById('loadingOverlay').style.display = 'none';
  render();
});

// ── Genre toggle ──
window.toggleGenre = g => {
  if (g === 'all') {
    activeGenres = activeGenres.size === 3 ? new Set() : new Set(['shokugan','gacha','figure']);
  } else {
    if (activeGenres.has(g)) activeGenres.delete(g); else activeGenres.add(g);
  }
  updatePills(); render();
};
function updatePills() {
  document.querySelectorAll('[data-g]').forEach(p => {
    const g = p.dataset.g;
    const on = g === 'all' ? activeGenres.size === 3 : activeGenres.has(g);
    p.classList.toggle('off', !on);
  });
}

// ── View ──
window.setView = v => {
  currentView = v;
  ['cal','card','list'].forEach(n => {
    document.getElementById('view'+n.charAt(0).toUpperCase()+n.slice(1)).style.display = n===v ? '' : 'none';
    document.getElementById('v'+n.charAt(0).toUpperCase()+n.slice(1)).classList.toggle('on', n===v);
  });
  render();
};

window.prevMonth = () => { if(--month<0){month=11;year--;} render(); };
window.nextMonth = () => { if(++month>11){month=0;year++;} render(); };

// ── Render ──
function filtered() {
  return Object.entries(items)
    .filter(([,v]) => activeGenres.has(v.genre))
    .sort(([,a],[,b]) => a.date.localeCompare(b.date));
}
function thisMonth() {
  return filtered().filter(([,v]) => {
    const d = new Date(v.date+'T00:00:00');
    return d.getFullYear()===year && d.getMonth()===month;
  });
}

function render() {
  const mN = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthTitle').textContent = `${year}年 ${mN[month]}`;
  renderStats();
  if (currentView==='cal')  renderCal();
  if (currentView==='card') renderCard();
  if (currentView==='list') renderList();
}

function renderStats() {
  const tm = thisMonth();
  const cnt = {shokugan:0,gacha:0,figure:0};
  tm.forEach(([,v])=>cnt[v.genre]++);
  document.getElementById('statsRow').innerHTML =
    `<span class="stat-chip">この月 ${tm.length}件</span>` +
    (cnt.shokugan?`<span class="stat-chip">🍬 食玩 ${cnt.shokugan}</span>`:'') +
    (cnt.gacha   ?`<span class="stat-chip">🎰 ガチャ ${cnt.gacha}</span>`:'') +
    (cnt.figure  ?`<span class="stat-chip">🗿 フィギュア ${cnt.figure}</span>`:'');
}

function renderCal() {
  const dayLabels = ['日','月','火','水','木','金','土'];
  const first = new Date(year,month,1).getDay();
  const last  = new Date(year,month+1,0).getDate();
  const today = new Date();
  const byDate = {};
  thisMonth().forEach(([,v])=>{ (byDate[v.date]=byDate[v.date]||[]).push(v); });

  let h = dayLabels.map((d,i)=>`<div class="cal-head">${d}</div>`).join('');
  for(let i=0;i<first;i++){
    const d=new Date(year,month,-first+i+1).getDate();
    h+=`<div class="cal-day other"><div class="dnum-wrap"><span class="dnum">${d}</span></div></div>`;
  }
  for(let d=1;d<=last;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===d;
    const dow=(new Date(year,month,d).getDay());
    const dowCls=dow===0?'sun':dow===6?'sat':'';
    const dayItems=byDate[ds]||[];
    const clickable=isAdmin?'clickable':'';
    h+=`<div class="cal-day ${isToday?'today':''} ${dowCls} ${dayItems.length||isAdmin?'clickable':''}" onclick="${isAdmin?`openAdd('${ds}')`:''}" >`;
    h+=`<div class="dnum-wrap"><span class="dnum">${d}</span></div>`;
    dayItems.slice(0,3).forEach(v=>{
      const name=v.url?`<a href="${v.url}" target="_blank" style="color:inherit;text-decoration:none" onclick="event.stopPropagation()">${v.name}</a>`:v.name;
      h+=`<span class="chip ${GC[v.genre]}" title="${v.name}">${name}</span>`;
    });
    if(dayItems.length>3) h+=`<span class="chip-more">+${dayItems.length-3}件</span>`;
    h+='</div>';
  }
  const rem=(first+last)%7;
  if(rem>0) for(let i=1;i<=7-rem;i++) h+=`<div class="cal-day other"><div class="dnum-wrap"><span class="dnum">${i}</span></div></div>`;
  document.getElementById('calGrid').innerHTML=h;
}

function imgTag(v, cls, phCls) {
  if(v.img) return `<img src="${v.img}" class="${cls}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="${phCls}" style="display:none">${GE[v.genre]}</div>`;
  return `<div class="${phCls}">${GE[v.genre]}</div>`;
}

function renderCard() {
  const tm = thisMonth();
  if(!tm.length){ document.getElementById('cardGrid').innerHTML='<div class="empty" style="grid-column:1/-1">この月の登録アイテムはありません</div>'; return; }
  document.getElementById('cardGrid').innerHTML = tm.map(([k,v])=>{
    const d=new Date(v.date+'T00:00:00');
    return `<div class="item-card">
      ${imgTag(v,'card-img','card-img-placeholder')}
      <div class="card-body">
        <div class="card-name">${v.url?`<a href="${v.url}" target="_blank" style="color:inherit">${v.name}</a>`:v.name}</div>
        <div class="card-date">${d.getMonth()+1}月${d.getDate()}日${v.note?` · ${v.note}`:''}</div>
        <span class="card-badge" style="${GB[v.genre]}">${GL[v.genre]}</span>
        ${isAdmin?`<div class="card-actions">
          <button class="btn btn-sm btn-ghost" onclick="openEdit('${k}')">✏️ 編集</button>
          <button class="btn btn-sm btn-ghost" style="color:#a32d2d" onclick="delItem('${k}')">削除</button>
        </div>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderList() {
  const tm = thisMonth();
  if(!tm.length){ document.getElementById('listView').innerHTML='<div class="empty">この月の登録アイテムはありません</div>'; return; }
  document.getElementById('listView').innerHTML = tm.map(([k,v])=>{
    const d=new Date(v.date+'T00:00:00');
    return `<div class="list-item">
      ${imgTag(v,'list-thumb','list-thumb-ph')}
      <div class="list-info">
        <div class="list-name">${v.url?`<a href="${v.url}" target="_blank" style="color:inherit;text-decoration:none">${v.name}</a>`:v.name}</div>
        <div class="list-meta">${d.getMonth()+1}/${d.getDate()}${v.note?` · ${v.note}`:''}</div>
      </div>
      <span class="list-badge" style="${GB[v.genre]}">${GL[v.genre]}</span>
      ${isAdmin?`<div class="list-acts">
        <button class="icon-btn" onclick="openEdit('${k}')">✏️</button>
        <button class="icon-btn danger" onclick="delItem('${k}')">✕</button>
      </div>`:''}
    </div>`;
  }).join('');
}

// ── Admin ──
window.toggleAdmin = () => {
  if(isAdmin){ isAdmin=false; updateAdminUI(); return; }
  document.getElementById('loginModal').classList.add('open');
  document.getElementById('pwInput').value='';
  document.getElementById('loginErr').classList.remove('show');
  setTimeout(()=>document.getElementById('pwInput').focus(),100);
};
window.doLogin = () => {
  if(document.getElementById('pwInput').value === ADMIN_PASSWORD){
    isAdmin=true;
    closeModal('loginModal');
    updateAdminUI();
  } else {
    document.getElementById('loginErr').classList.add('show');
  }
};
function updateAdminUI(){
  document.getElementById('adminBadge').classList.toggle('show',isAdmin);
  document.getElementById('adminBtn').textContent=isAdmin?'ログアウト':'管理者';
  document.getElementById('addBtn').style.display=isAdmin?'':'none';
  document.getElementById('aiSection').style.display=isAdmin?'':'none';
  render();
}

// ── Add/Edit ──
window.openAdd = (prefillDate) => {
  editKey=null;
  document.getElementById('modalTitle').textContent='アイテムを追加';
  document.getElementById('fName').value='';
  document.getElementById('fDate').value=prefillDate||'';
  document.getElementById('fNote').value='';
  document.getElementById('fUrl').value='';
  document.getElementById('fImg').value='';
  document.getElementById('imgPreview').classList.remove('show');
  selGenre('shokugan');
  document.getElementById('itemModal').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(),100);
};
window.openEdit = k => {
  const v=items[k]; if(!v) return;
  editKey=k;
  document.getElementById('modalTitle').textContent='アイテムを編集';
  document.getElementById('fName').value=v.name;
  document.getElementById('fDate').value=v.date;
  document.getElementById('fNote').value=v.note||'';
  document.getElementById('fUrl').value=v.url||'';
  document.getElementById('fImg').value=v.img||'';
  previewImg();
  selGenre(v.genre);
  document.getElementById('itemModal').classList.add('open');
};
window.selGenre = g => {
  selGenreVal=g;
  document.querySelectorAll('.go').forEach(b=>b.classList.toggle('on',b.dataset.g===g));
};
window.previewImg = () => {
  const url=document.getElementById('fImg').value.trim();
  const img=document.getElementById('imgPreview');
  if(url){ img.src=url; img.classList.add('show'); } else { img.classList.remove('show'); }
};
window.saveItem = () => {
  const name=document.getElementById('fName').value.trim();
  const date=document.getElementById('fDate').value;
  if(!name||!date){ alert('商品名と発売日は必須です'); return; }
  const data={
    name, date, genre:selGenreVal,
    note:document.getElementById('fNote').value.trim(),
    url: document.getElementById('fUrl').value.trim(),
    img: document.getElementById('fImg').value.trim(),
    updatedAt: Date.now()
  };
  if(editKey){ set(ref(db,'items/'+editKey),data); }
  else { push(itemsRef,data); }
  closeModal('itemModal');
  const d=new Date(date+'T00:00:00');
  year=d.getFullYear(); month=d.getMonth();
};
window.delItem = k => {
  if(!confirm('削除しますか？')) return;
  remove(ref(db,'items/'+k));
};

// ── AI Search ──
window.aiSearch = async () => {
  const q=document.getElementById('aiInput').value.trim(); if(!q) return;
  const el=document.getElementById('aiResults');
  el.innerHTML='<div class="ai-status"><span class="spinner"></span>検索中...</div>';
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1500,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:`あなたは食玩・ガチャガチャ・フィギュアの発売情報専門アシスタントです。
ユーザーのクエリで発売予定商品をWeb検索し、以下のJSON形式のみを返してください：
{"items":[{"name":"商品名","date":"YYYY-MM-DD","genre":"shokugan|gacha|figure","note":"メーカーや種類など","url":"公式/販売URL","img":"商品画像URL"}]}
ルール：genreはshokugan/gacha/figureのいずれか。imgは実際の商品画像URL（見つからなければ空文字）。発売月のみ判明の場合はその月の1日。最大6件。JSONのみ返す。`,
        messages:[{role:'user',content:`発売情報を調べて: ${q}`}]
      })
    });
    const data=await res.json();
    const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const match=text.match(/\{[\s\S]*\}/);
    if(!match) throw new Error('parse');
    const found=JSON.parse(match[0]).items||[];
    if(!found.length){ el.innerHTML='<div class="ai-status">該当する情報が見つかりませんでした</div>'; return; }
    window._aiItems=found;
    el.innerHTML=found.map((v,i)=>{
      const imgHtml=v.img
        ?`<img src="${v.img}" class="ai-item-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="ai-item-img-ph" style="display:none">${GE[v.genre]||'🎁'}</div>`
        :`<div class="ai-item-img-ph">${GE[v.genre]||'🎁'}</div>`;
      return `<div class="ai-item">
        ${imgHtml}
        <div class="ai-item-info">
          <div class="ai-item-name">${v.name}</div>
          <div class="ai-item-meta">${GL[v.genre]||v.genre} · ${v.date||'日付不明'}${v.note?'・'+v.note:''}</div>
        </div>
        <button class="ai-add-btn" id="aib${i}" onclick="addAi(${i})">＋ 追加</button>
      </div>`;
    }).join('');
  } catch(e){
    el.innerHTML='<div class="ai-status">検索に失敗しました。手動で追加してみてください。</div>';
  }
};
window.addAi = i => {
  const v=window._aiItems[i]; if(!v) return;
  push(itemsRef,{
    name:v.name, date:v.date||new Date().toISOString().slice(0,10),
    genre:v.genre||'figure', note:v.note||'', url:v.url||'', img:v.img||'',
    updatedAt:Date.now()
  });
  const btn=document.getElementById('aib'+i);
  if(btn){btn.textContent='✓ 追加済';btn.classList.add('added');btn.disabled=true;}
  const d=new Date((v.date||new Date().toISOString().slice(0,10))+'T00:00:00');
  year=d.getFullYear(); month=d.getMonth();
};

// ── Modal helpers ──
window.closeModal = id => document.getElementById(id).classList.remove('open');
window.bgClick = (e,id) => { if(e.target===document.getElementById(id)) closeModal(id); };
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal('itemModal'); closeModal('loginModal'); } });

// init pills
updatePills();
</script>
</body>
</html>
