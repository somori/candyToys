<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CandyToys - 食玩・ガチャ 発売カレンダー</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta property="og:title" content="CandyToys - 食玩・ガチャ 発売カレンダー">
<meta property="og:description" content="食玩・ガチャガチャ・フィギュア・一番くじの発売情報カレンダー">
<meta property="og:image" content="https://somori.github.io/candyToys/logo.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://somori.github.io/candyToys/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://somori.github.io/candyToys/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f5f0;
  --bg2: #eeeae2;
  --bg3: #e4dfd5;
  --surface: #fffefb;
  --text: #1c1a16;
  --text2: #6b6558;
  --text3: #a09890;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --accent: #e8622a;
  --accent2: #f5a623;
  --radius: 10px;
  --radius-lg: 16px;
  --radius-xl: 22px;
  --shadow: 0 2px 8px rgba(0,0,0,0.07);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --shokugan: #FAC775;
  --shokugan-dark: #7a4800;
  --gacha: #7ed9b8;
  --gacha-dark: #0a4a33;
  --figure: #93c4f0;
  --figure-dark: #0a3560;
  --ichiban: #f0b0d8;
  --ichiban-dark: #6a0040;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #16140f;
    --bg2: #1e1c16;
    --bg3: #26231b;
    --surface: #1e1c16;
    --text: #f0ece3;
    --text2: #9a9080;
    --text3: #5c5548;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
  }
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  position: relative;
}

/* ── Header ── */
.header {
  position: fixed; bottom: 20px; right: 20px; z-index: 50;
  display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
}
.admin-fab {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border2);
  box-shadow: var(--shadow-lg); display: flex; align-items: center;
  justify-content: center; font-size: 20px; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.admin-fab:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
.admin-fab.active { background: var(--accent); }

/* Admin badge */
.admin-badge {
  font-size: 11px; font-weight: 700; padding: 4px 10px;
  border-radius: 99px; background: var(--accent); color: white;
  display: none; white-space: nowrap;
}
.admin-badge.show { display: inline-block; }

/* Buttons */
.btn {
  padding: 7px 15px; border-radius: var(--radius); font-size: 13px;
  font-weight: 500; cursor: pointer; border: 1px solid var(--border2);
  background: var(--surface); color: var(--text);
  transition: all 0.15s; font-family: inherit;
}
.btn:hover { background: var(--bg2); }
.btn:active { transform: scale(0.97); }
.btn-accent {
  background: var(--accent); color: white; border-color: transparent;
}
.btn-accent:hover { background: #d0511e; }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { background: var(--bg2); }

/* ── App body ── */
.app { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

/* ── Genre tabs ── */
.genre-tabs {
  display: flex; gap: 0; margin-bottom: 1.2rem;
  background: var(--bg2); border-radius: var(--radius-lg); padding: 4px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.genre-tabs::-webkit-scrollbar { display: none; }
.gtab {
  flex: 1; min-width: fit-content; padding: 7px 12px;
  border-radius: var(--radius); font-size: 12px; font-weight: 700;
  cursor: pointer; border: none; background: none; color: var(--text2);
  transition: all 0.15s; white-space: nowrap; font-family: inherit;
  text-align: center;
}
.gtab.on {
  background: var(--surface); color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.gtab-shokugan.on { background: var(--shokugan); color: var(--shokugan-dark); }
.gtab-gacha.on    { background: var(--gacha);    color: var(--gacha-dark); }
.gtab-figure.on   { background: var(--figure);   color: var(--figure-dark); }
.gtab-ichiban.on  { background: var(--ichiban);  color: var(--ichiban-dark); }
.gtab-fav.on      { background: #f5d020;         color: #5a3c00; }

/* View tabs */
.view-tabs {
  display: flex; background: var(--bg2); border-radius: var(--radius-lg); padding: 3px;
}
.vtab {
  flex: 1; padding: 5px 10px; border-radius: var(--radius); font-size: 12px;
  font-weight: 700; cursor: pointer; border: none; background: none;
  color: var(--text2); transition: all 0.15s; font-family: inherit; text-align: center;
}
.vtab.on { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

/* Fav button in detail */
.fav-btn {
  background: none; border: 1.5px solid var(--border2); border-radius: var(--radius);
  padding: 6px 14px; font-size: 15px; cursor: pointer; font-family: inherit;
  transition: all 0.15s; color: var(--text2);
}
.fav-btn.on { background: #fff0c0; border-color: #e8c840; color: #7a5a00; }

/* Notification toast */
.notif-toast {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg); border-radius: var(--radius-lg);
  padding: 12px 20px; font-size: 14px; font-weight: 500; z-index: 300;
  box-shadow: var(--shadow-lg); max-width: 90vw; text-align: center;
  animation: toastIn 0.25s ease;
}
@keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(-10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
.notif-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); margin-right: 6px; vertical-align: middle;
}

/* Nav */
.nav-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;
}
.nav-arrow {
  width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; cursor: pointer; border: 1px solid var(--border2);
  background: var(--surface); font-size: 16px; transition: background 0.12s;
  color: var(--text);
}
.nav-arrow:hover { background: var(--bg2); }
.month-title {
  flex: 1; text-align: center;
  font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 700;
  letter-spacing: -0.5px;
}
/* Stats text */
.stats-row {
  display: flex; gap: 4px 8px; flex-wrap: wrap;
  margin-bottom: 1rem;
  font-size: 12px; color: var(--text2); align-items: center;
  justify-content: flex-start;
}
.stats-row .stat-sep { color: var(--border2); margin: 0 2px; }

/* Filters row */
.filters-row {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.2rem;
  justify-content: center;
}

/* ── Calendar ── */
.cal-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow);
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 1px; background: var(--border);
  table-layout: fixed;
}
.cal-head {
  background: var(--bg2); padding: 8px 0; text-align: center;
  font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 1px;
  min-width: 0; overflow: hidden;
}
.cal-head:first-child { color: #e05050; }
.cal-head:last-child  { color: #5080e0; }
.cal-day {
  background: var(--surface); min-height: 88px; padding: 5px;
  cursor: default; transition: background 0.1s;
  min-width: 0; overflow: hidden; word-break: break-all;
}
.cal-day.other { background: var(--bg); }
.cal-day.clickable { cursor: pointer; }
.cal-day.clickable:hover { background: var(--bg2); }
.cal-day.today .dnum { background: var(--accent); color: white; border-radius: 50%; }
.cal-day:first-child .dnum, .cal-day.sun .dnum { color: #e05050; }
.cal-day.sat .dnum { color: #5080e0; }
.dnum-wrap { display: flex; justify-content: flex-end; margin-bottom: 3px; }
.dnum { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text3); }
.cal-day.other .dnum { opacity: 0.35; }
.chip {
  font-size: 10px; padding: 2px 5px; border-radius: 5px; margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700;
  line-height: 1.5; display: block; max-width: 100%;
}
.chip-shokugan { background: var(--shokugan); color: var(--shokugan-dark); }
.chip-gacha    { background: var(--gacha);    color: var(--gacha-dark); }
.chip-figure   { background: var(--figure);   color: var(--figure-dark); }
.chip-ichiban  { background: var(--ichiban);  color: var(--ichiban-dark); }
.chip-more { font-size: 10px; color: var(--text3); padding-left: 3px; font-weight: 500; }

/* ── Card Grid (image view) ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}
.item-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s; cursor: pointer;
}
.item-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.card-img-wrap { position: relative; width: 100%; aspect-ratio: 1; }
.card-img {
  width: 100%; height: 100%; object-fit: cover;
  background: var(--bg2); display: block;
}
.card-img-placeholder {
  width: 100%; height: 100%; background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
}
.card-date-overlay {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 8px 10px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.card-date-day {
  font-family: 'Poppins', sans-serif;
  font-size: 28px; font-weight: 700; color: white; line-height: 1;
  text-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.card-date-label {
  font-size: 11px; color: rgba(255,255,255,0.85); font-weight: 500;
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  margin-top: 1px;
}
.card-body { padding: 8px 10px 10px; }
.card-name { font-size: 12px; font-weight: 700; margin-bottom: 5px; line-height: 1.4; }
.card-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 99px;
  font-weight: 700; display: inline-block;
}
.card-vague-badge {
  display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 4px;
  background: var(--bg2); color: var(--text2); font-weight: 700; margin-left: 4px;
  border: 1px solid var(--border2);
}

/* ── List View ── */
.list-view { display: flex; flex-direction: column; gap: 6px; }
.list-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 10px 14px; box-shadow: var(--shadow);
}
.list-thumb {
  width: 44px; height: 44px; border-radius: 8px; object-fit: cover;
  background: var(--bg2); flex-shrink: 0;
}
.list-thumb-ph {
  width: 44px; height: 44px; border-radius: 8px; background: var(--bg2);
  display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
}
.list-info { flex: 1; min-width: 0; }
.list-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.list-badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 700; white-space: nowrap; }
.list-acts { display: flex; gap: 4px; }
.icon-btn {
  background: none; border: none; cursor: pointer; color: var(--text3);
  padding: 4px 7px; border-radius: 6px; font-size: 14px; transition: background 0.12s;
}
.icon-btn:hover { background: var(--bg2); color: var(--text); }
.icon-btn.danger:hover { background: #fcebeb; color: #a32d2d; }

.empty { text-align: center; padding: 3rem; color: var(--text3); font-size: 14px; }


.spinner {
  display: inline-block; width: 13px; height: 13px;
  border: 2px solid var(--border2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Modal ── */
.modal-bg {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  z-index: 200; align-items: center; justify-content: center; padding: 5%;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius-xl);
  border: 1px solid var(--border2); padding: 1.75rem;
  width: 100%; box-shadow: var(--shadow-lg);
  animation: slideUp 0.25s ease;
  max-height: 90vh; overflow-y: auto;
  touch-action: pan-y;
}
@media (min-width: 600px) {
  .modal-bg { padding: 1rem; }
  .modal { width: min(480px, 100%); }
}
.modal-handle {
  width: 40px; height: 4px; border-radius: 99px;
  background: var(--border2); margin: 0 auto 1.25rem;
}
.detail-modal {
  background: var(--surface); border-radius: var(--radius-xl);
  border: 1px solid var(--border2); width: 100%;
  box-shadow: var(--shadow-lg); animation: slideUp 0.25s ease; overflow: hidden;
  touch-action: pan-y;
}
@media (min-width: 600px) {
  .detail-modal { width: min(420px, 100%); }
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 1.25rem; }
.fg { margin-bottom: 14px; }
.fg label { font-size: 12px; color: var(--text2); font-weight: 700; display: block; margin-bottom: 5px; letter-spacing: 0.5px; }
.fg input, .fg select, .fg textarea {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border2);
  border-radius: var(--radius); font-size: 14px;
  background: var(--bg); color: var(--text); font-family: inherit;
  transition: border-color 0.12s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: var(--accent); }
.genre-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.go {
  padding: 8px; border-radius: var(--radius); border: 2px solid var(--border2);
  cursor: pointer; text-align: center; font-size: 12px; font-weight: 700;
  transition: all 0.12s; opacity: 0.45; font-family: inherit;
}
.go.on { opacity: 1; }
.go-shokugan { background: var(--shokugan); color: var(--shokugan-dark); border-color: #d4933a; }
.go-gacha    { background: var(--gacha);    color: var(--gacha-dark);    border-color: #2aaa7a; }
.go-figure   { background: var(--figure);   color: var(--figure-dark);   border-color: #4a9ae0; }
.go-ichiban  { background: var(--ichiban);  color: var(--ichiban-dark);  border-color: #d070a8; }
.img-preview {
  width: 100%; max-height: 120px; object-fit: cover; border-radius: var(--radius);
  margin-top: 6px; display: none; border: 1px solid var(--border);
}
.img-preview.show { display: block; }
.modal-acts { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }

/* Login modal */
.login-modal {
  background: var(--surface); border-radius: var(--radius-xl);
  border: 1px solid var(--border2); padding: 2rem;
  width: min(360px, 100%); box-shadow: var(--shadow-lg);
  animation: slideUp 0.2s ease; text-align: center;
}
.login-modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.login-modal p { font-size: 13px; color: var(--text2); margin-bottom: 1.25rem; }
.login-modal input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border2);
  border-radius: var(--radius); font-size: 15px; background: var(--bg);
  color: var(--text); font-family: inherit; text-align: center; letter-spacing: 2px;
  margin-bottom: 12px;
}
.login-modal input:focus { outline: none; border-color: var(--accent); }
.login-err { font-size: 12px; color: #a32d2d; margin-top: -6px; margin-bottom: 10px; display: none; }
.login-err.show { display: block; }

/* Loading overlay */
.loading-overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; flex-direction: column; gap: 12px;
}
.loading-overlay .spinner { width: 28px; height: 28px; border-width: 3px; }
.loading-overlay p { font-size: 14px; color: var(--text2); }

/* Detail modal */
.detail-modal {
  background: var(--surface); border-radius: var(--radius-xl);
  border: 1px solid var(--border2); width: min(420px, 100%);
  box-shadow: var(--shadow-lg); animation: slideUp 0.2s ease; overflow: hidden;
}
.detail-img { width: 100%; max-height: 60vh; object-fit: contain; background: var(--bg2); display: block; padding: 8px; }
.detail-img-ph { width: 100%; aspect-ratio: 1; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 64px; }
.detail-body { padding: 1.25rem 1.5rem 1.5rem; }
.detail-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
.detail-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; align-items: center; }
.detail-date { font-size: 13px; color: var(--text2); font-weight: 500; }
.detail-note { font-size: 13px; color: var(--text2); }
.detail-acts { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; }
.detail-nav-btn {
  padding: 6px 16px; border-radius: var(--radius); border: 1px solid var(--border2);
  background: var(--bg2); color: var(--text); font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: background 0.12s;
}
.detail-nav-btn:hover:not(:disabled) { background: var(--bg3); }
.detail-nav-btn:disabled { opacity: 0.3; cursor: default; }

/* Cal thumbnail chip */
.chip-thumb-img { width: 14px; height: 14px; border-radius: 2px; object-fit: cover; flex-shrink: 0; vertical-align: middle; margin-right: 2px; }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <img src="logo.png" alt="CandyToys" style="width:180px;height:auto;animation:logoFloat 1.5s ease-in-out infinite alternate;" />
  <p style="margin-top:8px">読み込み中...</p>
</div>

<style>
@keyframes logoFloat {
  from { transform: translateY(0px); }
  to   { transform: translateY(-10px); }
}
</style>

<!-- Header -->
<header class="header">
  <button class="btn btn-sm btn-accent" id="addBtn" onclick="openAdd()" style="display:none;border-radius:99px;padding:6px 14px">＋ 追加</button>
  <span class="admin-badge" id="adminBadge">管理者モード</span>
  <div class="admin-fab" id="adminBtn" onclick="toggleAdmin()" title="管理者">✏️</div>
</header>

<!-- App -->
<div class="app">

  <!-- Logo hero -->
  <div style="text-align:center; padding: 2rem 0 1rem;">
    <img src="logo.png" alt="CandyToys" style="width: min(320px, 70vw); height: auto;" />
  </div>
  <!-- Genre tabs -->
  <div class="genre-tabs">
    <button class="gtab on"            data-g="all"      onclick="toggleGenre('all')">すべて</button>
    <button class="gtab gtab-shokugan" data-g="shokugan" onclick="toggleGenre('shokugan')">🍬 食玩</button>
    <button class="gtab gtab-gacha"    data-g="gacha"    onclick="toggleGenre('gacha')">🎰 ガチャ</button>
    <button class="gtab gtab-figure"   data-g="figure"   onclick="toggleGenre('figure')">🗿 フィギュア</button>
    <button class="gtab gtab-ichiban"  data-g="ichiban"  onclick="toggleGenre('ichiban')">🎀 一番くじ</button>
    <button class="gtab gtab-fav"      data-g="fav"      onclick="toggleFav()">⭐ ほしい！</button>
  </div>

  <!-- Nav -->
  <div class="nav-row">
    <div class="nav-arrow" onclick="prevMonth()">‹</div>
    <div style="flex:1;text-align:center">
      <div class="month-title" id="monthTitle"></div>
    </div>
    <div class="nav-arrow" onclick="nextMonth()">›</div>
    <div class="view-tabs">
      <button class="vtab" id="vCal"  onclick="setView('cal')">📅 カレンダー</button>
      <button class="vtab on" id="vCard" onclick="setView('card')">🖼 カード</button>
      <button class="vtab" id="vList" onclick="setView('list')">📋 リスト</button>
    </div>
  </div>

  <!-- Stats -->

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ============================================================
// 🔧 設定：あとでここを書き換えてください
// ============================================================
const ADMIN_PASSWORD = "YOUR_PASSWORD"; // ← ここをあなたのパスワードに変更

const firebaseConfig = {
  apiKey: "AIzaSyDZLsBsHzv_CzWloLdiUahoFdny324DOME",
  authDomain: "candy-toys-8b49a.firebaseapp.com",
  databaseURL: "https://candy-toys-8b49a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "candy-toys-8b49a",
  storageBucket: "candy-toys-8b49a.firebasestorage.app",
  messagingSenderId: "740561068786",
  appId: "1:740561068786:web:f25fcf3ccc436c50a5e66b",
  measurementId: "G-6LM18K2L24"
};
// ============================================================

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const itemsRef = ref(db, 'items');

// ── State ──
let items = {};
let year  = new Date().getFullYear();
let month = new Date().getMonth();
let activeGenres = new Set(['shokugan','gacha','figure','ichiban']);
let currentView  = 'card';
let isAdmin      = false;
let editKey      = null;
let selGenreVal  = 'shokugan';

// ── Helpers ──
const GL = { shokugan:'食玩', gacha:'ガチャ', figure:'フィギュア', ichiban:'一番くじ' };
const GE = { shokugan:'🍬', gacha:'🎰', figure:'🗿', ichiban:'🎀' };
const GC = { shokugan:'chip-shokugan', gacha:'chip-gacha', figure:'chip-figure', ichiban:'chip-ichiban' };
const GB = { shokugan:`background:var(--shokugan);color:var(--shokugan-dark)`,
             gacha:   `background:var(--gacha);color:var(--gacha-dark)`,
             figure:  `background:var(--figure);color:var(--figure-dark)`,
             ichiban: `background:var(--ichiban);color:var(--ichiban-dark)` };

// ── Firebase realtime listener ──
onValue(itemsRef, snap => {
  items = snap.val() || {};
  document.getElementById('loadingOverlay').style.display = 'none';
  render();
  checkNotifications();
});

// ── Genre toggle ──
const ALL_GENRES = ['shokugan','gacha','figure','ichiban'];

// ── Favorites ──
const FAV_KEY = 'candytoys_favs';
let favMode = false;
function getFavs() { try { return new Set(JSON.parse(localStorage.getItem(FAV_KEY)||'[]')); } catch(e){ return new Set(); } }
function saveFavs(set) { try { localStorage.setItem(FAV_KEY, JSON.stringify([...set])); } catch(e){} }
function isFav(k) { return getFavs().has(k); }
function toggleFavItem(k) {
  const favs = getFavs();
  if(favs.has(k)) favs.delete(k); else favs.add(k);
  saveFavs(favs);
}

window.toggleFav = () => {
  favMode = !favMode;
  document.querySelector('[data-g="fav"]').classList.toggle('on', favMode);
  // favモード中は全ジャンル表示
  if(favMode) activeGenres = new Set(ALL_GENRES);
  updatePills();
  render();
};

window.toggleGenre = g => {
  favMode = false;
  if (g === 'all') {
    activeGenres = new Set(ALL_GENRES);
  } else {
    if (activeGenres.size === 1 && activeGenres.has(g)) {
      activeGenres = new Set(ALL_GENRES);
    } else {
      activeGenres = new Set([g]);
    }
  }
  updatePills(); render();
};
function updatePills() {
  document.querySelectorAll('[data-g]').forEach(p => {
    const g = p.dataset.g;
    if (g === 'all') {
      p.classList.toggle('on', activeGenres.size === ALL_GENRES.length && !favMode);
    } else if (g === 'fav') {
      p.classList.toggle('on', favMode);
    } else {
      p.classList.toggle('on', activeGenres.size === 1 && activeGenres.has(g) && !favMode);
    }
  });
}

// ── View ──
window.setView = v => {
  currentView = v;
  ['cal','card','list'].forEach(n => {
    document.getElementById('view'+n.charAt(0).toUpperCase()+n.slice(1)).style.display = n===v ? '' : 'none';
    document.getElementById('v'+n.charAt(0).toUpperCase()+n.slice(1)).classList.toggle('on', n===v);
  });
  render();
};

window.prevMonth = () => { if(--month<0){month=11;year--;} render(); };
window.nextMonth = () => { if(++month>11){month=0;year++;} render(); };

// ── Date helpers ──
function formatDateLabel(v) {
  // returns {day, label, sortKey}
  const type = v.dateType || 'exact';
  if (type === 'month') {
    const [y,m] = (v.dateMonth||'').split('-');
    return { day: m ? `${parseInt(m)}月` : '?', label: y ? `${y}年` : '', sortKey: v.dateMonth||'9999-99' };
  }
  if (type === 'period') {
    const [y,m] = (v.datePeriodMonth||'').split('-');
    const sub = { w1:'第1週', w2:'第2週', w3:'第3週', w4:'第4週', w5:'第5週',
                  early:'上旬', mid:'中旬', late:'下旬' }[v.datePeriodSub]||'';
    return { day: m ? `${parseInt(m)}月` : '?', label: y ? `${y}年 ${sub}` : sub, sortKey: v.datePeriodMonth||'9999-99' };
  }
  // exact
  if (!v.date) return { day: '?', label: '', sortKey: '9999-99-99' };
  const d = new Date(v.date+'T00:00:00');
  return { day: `${d.getDate()}`, label: `${d.getFullYear()}年${d.getMonth()+1}月`, sortKey: v.date };
}

function sortKey(v) { return formatDateLabel(v).sortKey; }

function filtered() {
  const favs = getFavs();
  return Object.entries(items)
    .filter(([k,v]) => activeGenres.has(v.genre) && (!favMode || favs.has(k)))
    .sort(([,a],[,b]) => sortKey(a).localeCompare(sortKey(b)));
}
function thisMonth() {
  return filtered().filter(([,v]) => {
    const type = v.dateType||'exact';
    let ym;
    if(type==='exact') ym = (v.date||'').slice(0,7);
    else if(type==='month') ym = v.dateMonth||'';
    else ym = v.datePeriodMonth||'';
    const target = `${year}-${String(month+1).padStart(2,'0')}`;
    return ym === target;
  });
}

function render() {
  const mN = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthTitle').textContent = `${year}年 ${mN[month]}`;
  renderStats();
  if (currentView==='cal')  renderCal();
  if (currentView==='card') renderCard();
  if (currentView==='list') renderList();
}

function renderStats() {
  const tm = thisMonth();
  const cnt = {shokugan:0,gacha:0,figure:0,ichiban:0};
  tm.forEach(([,v])=>{ if(cnt[v.genre]!==undefined) cnt[v.genre]++; });
  const parts = [`全${tm.length}件`];
  if(cnt.shokugan) parts.push(`🍬 食玩 ${cnt.shokugan}`);
  if(cnt.gacha)    parts.push(`🎰 ガチャ ${cnt.gacha}`);
  if(cnt.figure)   parts.push(`🗿 フィギュア ${cnt.figure}`);
  if(cnt.ichiban)  parts.push(`🎀 一番くじ ${cnt.ichiban}`);
  document.getElementById('statsRow').innerHTML =
    parts.map((p,i) => i===0 ? `<span>${p}</span>` : `<span class="stat-sep">|</span><span>${p}</span>`).join('');
}

function renderCal() {
  const dayLabels = ['日','月','火','水','木','金','土'];
  const first = new Date(year,month,1).getDay();
  const last  = new Date(year,month+1,0).getDate();
  const today = new Date();
  const byDate = {};
  thisMonth().forEach(([k,v])=>{
    // vagueなものは月の1日に表示
    let ds;
    const type = v.dateType||'exact';
    if(type==='exact') ds = v.date;
    else {
      const ym = type==='month' ? v.dateMonth : v.datePeriodMonth;
      ds = ym ? ym+'-01' : null;
    }
    if(ds)(byDate[ds]=byDate[ds]||[]).push([k,v]);
  });

  let h = dayLabels.map((d,i)=>`<div class="cal-head">${d}</div>`).join('');
  for(let i=0;i<first;i++){
    const d=new Date(year,month,-first+i+1).getDate();
    h+=`<div class="cal-day other"><div class="dnum-wrap"><span class="dnum">${d}</span></div></div>`;
  }
  for(let d=1;d<=last;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===d;
    const dow=(new Date(year,month,d).getDay());
    const dowCls=dow===0?'sun':dow===6?'sat':'';
    const dayItems=byDate[ds]||[];
    h+=`<div class="cal-day ${isToday?'today':''} ${dowCls} ${dayItems.length||isAdmin?'clickable':''}" onclick="${isAdmin&&!dayItems.length?`openAdd('${ds}')`:''}" >`;
    h+=`<div class="dnum-wrap"><span class="dnum">${d}</span></div>`;
    dayItems.slice(0,3).forEach(([k,v])=>{
      const thumb = v.img ? `<img src="${v.img}" class="chip-thumb-img" onerror="this.style.display='none'" />` : '';
      h+=`<span class="chip ${GC[v.genre]}" onclick="event.stopPropagation();openDetail('${k}')" title="${v.name}">${thumb}${v.name}</span>`;
    });
    if(dayItems.length>3) h+=`<span class="chip-more" onclick="event.stopPropagation();openDetail('${dayItems[0][0]}')" >+${dayItems.length-3}件</span>`;
    h+='</div>';
  }
  const rem=(first+last)%7;
  if(rem>0) for(let i=1;i<=7-rem;i++) h+=`<div class="cal-day other"><div class="dnum-wrap"><span class="dnum">${i}</span></div></div>`;
  document.getElementById('calGrid').innerHTML=h;
}

function imgTag(v, cls, phCls) {
  if(v.img) return `<img src="${v.img}" class="${cls}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="${phCls}" style="display:none">${GE[v.genre]}</div>`;
  return `<div class="${phCls}">${GE[v.genre]}</div>`;
}

function renderCard() {
  const tm = thisMonth();
  if(!tm.length){ document.getElementById('cardGrid').innerHTML='<div class="empty" style="grid-column:1/-1">この月の登録アイテムはありません</div>'; return; }
  document.getElementById('cardGrid').innerHTML = tm.map(([k,v])=>{
    const dl = formatDateLabel(v);
    const isVague = (v.dateType||'exact') !== 'exact';
    const faved = isFav(k);
    const imgInner = v.img
      ? `<img src="${v.img}" class="card-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="card-img-placeholder" style="display:none">${GE[v.genre]}</div>`
      : `<div class="card-img-placeholder">${GE[v.genre]}</div>`;
    return `<div class="item-card" onclick="openDetail('${k}')">
      <div class="card-img-wrap">
        ${imgInner}
        <div class="card-date-overlay">
          <div class="card-date-day">${dl.day}</div>
          <div class="card-date-label">${dl.label}</div>
        </div>
        ${faved?`<div style="position:absolute;top:6px;right:6px;font-size:18px;line-height:1;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.3))">⭐</div>`:''}
      </div>
      <div class="card-body">
        <div class="card-name">${v.name}</div>
        ${v.price?`<div style="font-size:11px;color:var(--accent);font-weight:700;margin-bottom:4px">💴 ${v.price}</div>`:''}
        <span class="card-badge" style="${GB[v.genre]}">${GL[v.genre]}</span>${isVague?`<span class="card-vague-badge">目安</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderList() {
  const tm = thisMonth();
  if(!tm.length){ document.getElementById('listView').innerHTML='<div class="empty">この月の登録アイテムはありません</div>'; return; }
  document.getElementById('listView').innerHTML = tm.map(([k,v])=>{
    const dl = formatDateLabel(v);
    const isVague = (v.dateType||'exact') !== 'exact';
    return `<div class="list-item" onclick="openDetail('${k}')" style="cursor:pointer">
      ${imgTag(v,'list-thumb','list-thumb-ph')}
      <div class="list-info">
        <div class="list-name">${v.name}</div>
        <div class="list-meta">${dl.label} ${dl.day}${isVague?' (目安)':''}${v.price?` · 💴${v.price}`:''}${v.note?` · ${v.note}`:''}</div>
      </div>
      <span class="list-badge" style="${GB[v.genre]}">${GL[v.genre]}</span>
    </div>`;
  }).join('');
}

// ── Admin ──
window.toggleAdmin = () => {
  if(isAdmin){ isAdmin=false; updateAdminUI(); return; }
  document.getElementById('loginModal').classList.add('open');
  document.getElementById('pwInput').value='';
  document.getElementById('loginErr').classList.remove('show');
  setTimeout(()=>document.getElementById('pwInput').focus(),100);
};
window.doLogin = () => {
  if(document.getElementById('pwInput').value === ADMIN_PASSWORD){
    isAdmin=true;
    closeModal('loginModal');
    updateAdminUI();
  } else {
    document.getElementById('loginErr').classList.add('show');
  }
};
function updateAdminUI(){
  document.getElementById('adminBadge').classList.toggle('show',isAdmin);
  document.getElementById('adminBtn').classList.toggle('active',isAdmin);
  document.getElementById('adminBtn').textContent = isAdmin ? '✕' : '✏️';
  document.getElementById('addBtn').style.display=isAdmin?'':'none';
  render();
}

// ── Add/Edit ──
window.updateDateFields = () => {
  const t = document.getElementById('fDateType').value;
  document.getElementById('fDateExactWrap').style.display  = t==='exact'  ? '' : 'none';
  document.getElementById('fDateMonthWrap').style.display  = t==='month'  ? '' : 'none';
  document.getElementById('fDatePeriodWrap').style.display = t==='period' ? '' : 'none';
};

window.openAdd = (prefillDate) => {
  editKey=null;
  document.getElementById('modalTitle').textContent='アイテムを追加';
  document.getElementById('fName').value='';
  document.getElementById('fDate').value=prefillDate||'';
  document.getElementById('fDateMonth').value='';
  document.getElementById('fDatePeriodMonth').value='';
  document.getElementById('fDateType').value='exact';
  document.getElementById('fNote').value='';
  document.getElementById('fPrice').value='';
  document.getElementById('fUrl').value='';
  document.getElementById('fImg').value='';
  document.getElementById('imgPreview').classList.remove('show');
  updateDateFields();
  selGenre('shokugan');
  document.getElementById('itemModal').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(),100);
};
window.openEdit = k => {
  const v=items[k]; if(!v) return;
  editKey=k;
  document.getElementById('modalTitle').textContent='アイテムを編集';
  document.getElementById('fName').value=v.name;
  const type = v.dateType||'exact';
  document.getElementById('fDateType').value=type;
  document.getElementById('fDate').value=v.date||'';
  document.getElementById('fDateMonth').value=v.dateMonth||'';
  document.getElementById('fDatePeriodMonth').value=v.datePeriodMonth||'';
  document.getElementById('fDatePeriodSub').value=v.datePeriodSub||'early';
  updateDateFields();
  document.getElementById('fNote').value=v.note||'';
  document.getElementById('fPrice').value=v.price||'';
  document.getElementById('fUrl').value=v.url||'';
  document.getElementById('fImg').value=v.img||'';
  previewImg();
  selGenre(v.genre);
  document.getElementById('itemModal').classList.add('open');
};
window.selGenre = g => {
  selGenreVal=g;
  document.querySelectorAll('.go').forEach(b=>b.classList.toggle('on',b.dataset.g===g));
};
window.previewImg = () => {
  const url=document.getElementById('fImg').value.trim();
  const img=document.getElementById('imgPreview');
  if(url){ img.src=url; img.classList.add('show'); } else { img.classList.remove('show'); }
};
window.saveItem = () => {
  const name=document.getElementById('fName').value.trim();
  const dateType=document.getElementById('fDateType').value;
  let date='', dateMonth='', datePeriodMonth='', datePeriodSub='';
  if(dateType==='exact') { date=document.getElementById('fDate').value; if(!date){alert('発売日を入力してください');return;} }
  else if(dateType==='month') { dateMonth=document.getElementById('fDateMonth').value; if(!dateMonth){alert('年月を入力してください');return;} }
  else { datePeriodMonth=document.getElementById('fDatePeriodMonth').value; datePeriodSub=document.getElementById('fDatePeriodSub').value; if(!datePeriodMonth){alert('年月を入力してください');return;} }
  if(!name){alert('商品名を入力してください');return;}
  const data={
    name, dateType, date, dateMonth, datePeriodMonth, datePeriodSub,
    genre:selGenreVal,
    price:document.getElementById('fPrice').value.trim(),
    note:document.getElementById('fNote').value.trim(),
    url: document.getElementById('fUrl').value.trim(),
    img: document.getElementById('fImg').value.trim(),
    adminKey: ADMIN_PASSWORD,
    updatedAt: Date.now()
  };
  const p = editKey ? set(ref(db,'items/'+editKey), data) : push(itemsRef, data);
  p.then(()=>{
    closeModal('itemModal');
    // 表示月をその月に移動
    const ym = date ? date.slice(0,7) : (dateMonth||datePeriodMonth);
    if(ym) { const [y,m]=ym.split('-'); year=parseInt(y); month=parseInt(m)-1; }
  }).catch(err=>{ alert('保存に失敗しました。\n'+err.message); });
};
window.delItem = k => {
  if(!confirm('削除しますか？')) return;
  // 削除前にadminKeyをセットしてからremove
  set(ref(db,'items/'+k+'/adminKey'), ADMIN_PASSWORD)
    .then(()=> remove(ref(db,'items/'+k)))
    .catch(err=>{ alert('削除に失敗しました。\n'+err.message); });
  closeModal('detailModal');
};

window.openDetail = (k, sourceList) => {
  // sourceListがなければ現在の表示リストを使う
  if (sourceList) window._detailList = sourceList;
  if (!window._detailList || !window._detailList.includes(k)) {
    window._detailList = thisMonth().map(([k])=>k);
  }
  window._detailKey = k;

  const v = items[k]; if(!v) return;
  const dl = formatDateLabel(v);
  const isVague = (v.dateType||'exact') !== 'exact';
  const dateStr = `${dl.label} ${dl.day}${isVague?' (目安)':''}`;

  const list = window._detailList;
  const idx = list.indexOf(k);
  const hasPrev = idx > 0;
  const hasNext = idx < list.length - 1;

  document.getElementById('detailImgWrap').innerHTML = v.img
    ? `<img src="${v.img}" class="detail-img" onerror="this.outerHTML='<div class=detail-img-ph>${GE[v.genre]}</div>'" />`
    : `<div class="detail-img-ph">${GE[v.genre]}</div>`;
  document.getElementById('detailName').textContent = v.name;
  document.getElementById('detailBadge').textContent = GL[v.genre];
  document.getElementById('detailBadge').style = GB[v.genre];
  document.getElementById('detailDate').textContent = dateStr;
  document.getElementById('detailNote').textContent = [v.price?`💴 ${v.price}`:'', v.note||''].filter(Boolean).join(' · ');

  // ナビゲーションボタン
  document.getElementById('detailNav').innerHTML =
    `<button class="detail-nav-btn" onclick="openDetail('${list[idx-1]}')" ${!hasPrev?'disabled':''}>‹ 前</button>
     <span style="font-size:11px;color:var(--text3)">${idx+1} / ${list.length}</span>
     <button class="detail-nav-btn" onclick="openDetail('${list[idx+1]}')" ${!hasNext?'disabled':''}>次 ›</button>`;

  const acts = [];
  const faved = isFav(k);
  acts.push(`<button class="fav-btn ${faved?'on':''}" id="favBtn" onclick="clickFav('${k}')">${faved?'⭐ ほしい！済':'⭐ ほしい！'}</button>`);
  if(v.url) acts.push(`<a href="${v.url}" target="_blank" class="btn btn-accent btn-sm">🔗 商品ページを開く</a>`);
  if(isAdmin) {
    acts.push(`<button class="btn btn-sm" onclick="closeModal('detailModal');openEdit('${k}')">✏️ 編集</button>`);
    acts.push(`<button class="btn btn-sm" style="color:#a32d2d" onclick="delItem('${k}')">🗑 削除</button>`);
  }
  document.getElementById('detailActs').innerHTML = acts.join('');
  document.getElementById('detailModal').classList.add('open');
};



// ── Swipe left/right in detail modal to navigate items (smooth slide) ──
(()=>{
  const bg = document.getElementById('detailModal');
  const getInner = () => bg.querySelector('.detail-modal');
  let startX = 0, startY = 0, isDragging = false;

  bg.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = true;
    const inner = getInner();
    if (inner) inner.style.transition = 'none';
  }, { passive: true });

  bg.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy)) {
      const inner = getInner();
      if (inner) inner.style.transform = `translateX(${dx * 0.4}px)`;
    }
  }, { passive: true });

  bg.addEventListener('touchend', e => {
    if (!isDragging) return;
    isDragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    const inner = getInner();

    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      const list = window._detailList || [];
      const idx = list.indexOf(window._detailKey);
      const canNext = dx < 0 && idx < list.length - 1;
      const canPrev = dx > 0 && idx > 0;

      if (canNext || canPrev) {
        // スライドアウト
        if (inner) {
          inner.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
          inner.style.transform = `translateX(${dx < 0 ? '-60%' : '60%'})`;
          inner.style.opacity = '0';
        }
        setTimeout(() => {
          if (inner) { inner.style.transition = 'none'; inner.style.transform = `translateX(${dx < 0 ? '60%' : '-60%'})`; inner.style.opacity = '0'; }
          if (canNext) openDetail(list[idx + 1]);
          else openDetail(list[idx - 1]);
          requestAnimationFrame(() => {
            const newInner = getInner();
            if (newInner) {
              newInner.style.transition = 'transform 0.22s ease, opacity 0.22s ease';
              newInner.style.transform = 'translateX(0)';
              newInner.style.opacity = '1';
            }
          });
        }, 180);
        return;
      }
    }
    // スナップバック
    if (inner) {
      inner.style.transition = 'transform 0.2s ease';
      inner.style.transform = 'translateX(0)';
      setTimeout(() => { if(inner) inner.style.transition = ''; }, 200);
    }
  }, { passive: true });
})();

// ── Swipe to close modals ──
function addSwipeToClose(modalId) {
  const bg = document.getElementById(modalId);
  const inner = bg.querySelector('.modal, .detail-modal, .login-modal');
  if (!inner) return;
  let startY = 0, curY = 0, dragging = false;

  inner.addEventListener('touchstart', e => {
    // スクロール中は無視
    startY = e.touches[0].clientY;
    curY = startY;
    dragging = true;
    inner.style.transition = 'none';
  }, { passive: true });

  inner.addEventListener('touchmove', e => {
    if (!dragging) return;
    curY = e.touches[0].clientY;
    const dy = curY - startY;
    if (dy > 0) {
      inner.style.transform = `translateY(${dy}px)`;
    }
  }, { passive: true });

  inner.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    const dy = curY - startY;
    inner.style.transition = 'transform 0.25s ease';
    if (dy > 100) {
      inner.style.transform = `translateY(100%)`;
      setTimeout(() => {
        closeModal(modalId);
        inner.style.transform = '';
        inner.style.transition = '';
      }, 220);
    } else {
      inner.style.transform = '';
      setTimeout(() => { inner.style.transition = ''; }, 250);
    }
  });
}

['itemModal','detailModal','loginModal'].forEach(addSwipeToClose);

window.clickFav = k => {
  toggleFavItem(k);
  const faved = isFav(k);
  const btn = document.getElementById('favBtn');
  if(btn){ btn.textContent = faved ? '⭐ ほしい！済' : '⭐ ほしい！'; btn.classList.toggle('on', faved); }
  if(favMode) render(); // favモード中なら再描画
};

// ── Modal helpers ──
window.closeModal = id => document.getElementById(id).classList.remove('open');
window.bgClick = (e,id) => { if(e.target===document.getElementById(id)) closeModal(id); };
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal('itemModal'); closeModal('loginModal'); closeModal('detailModal'); } });

// ── Notifications ──
async function checkNotifications() {
  if (!('Notification' in window)) return;
  // 通知許可をリクエスト
  if (Notification.permission === 'default') {
    await Notification.requestPermission();
  }
  if (Notification.permission !== 'granted') return;

  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const tomorrowDate = new Date(today); tomorrowDate.setDate(today.getDate()+1);
  const tomorrowStr = `${tomorrowDate.getFullYear()}-${String(tomorrowDate.getMonth()+1).padStart(2,'0')}-${String(tomorrowDate.getDate()).padStart(2,'0')}`;

  // 今日・明日発売のものを探す（exactのみ）
  const todayItems = [], tomorrowItems = [];
  Object.values(items).forEach(v => {
    if ((v.dateType||'exact') !== 'exact') return;
    if (v.date === todayStr) todayItems.push(v);
    if (v.date === tomorrowStr) tomorrowItems.push(v);
  });

  // 同日に複数回通知しないようにlocalStorageでチェック
  const notifKey = 'notif_last_' + todayStr;
  if (localStorage.getItem(notifKey)) return;
  localStorage.setItem(notifKey, '1');

  if (todayItems.length > 0) {
    const names = todayItems.map(v=>v.name).join('、');
    new Notification('🎉 本日発売！', {
      body: names,
      icon: 'https://cdn.jsdelivr.net/npm/twemoji@14.0.2/assets/72x72/1f3b2.png'
    });
  }
  if (tomorrowItems.length > 0) {
    const names = tomorrowItems.map(v=>v.name).join('、');
    new Notification('📅 明日発売！', {
      body: names,
      icon: 'https://cdn.jsdelivr.net/npm/twemoji@14.0.2/assets/72x72/1f4c5.png'
    });
  }

  // トースト表示（通知と別に画面内にも出す）
  const toastItems = [...todayItems.map(v=>`🎉 本日発売：${v.name}`), ...tomorrowItems.map(v=>`📅 明日発売：${v.name}`)];
  if (toastItems.length > 0) showToast(toastItems.join('\n'));
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'notif-toast';
  el.innerHTML = `<span class="notif-dot"></span>${msg.replace(/\n/g,'<br>')}`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 5000);
}
